<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ALL Login</title>

<!-- FONT AWESOME -->
<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"/>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    width:100%;
    height:100vh;
    overflow:hidden;
    font-family:"Roboto Condensed", sans-serif;
    background:
    linear-gradient(to bottom,#0c87c9 0%,#284b63 100%);
}

/* MAIN */
.main{
    width:100%;
    display:flex;
    flex-direction:column;
    align-items:center;
}

/* LOGO */
.logo{
    font-family:Georgia, serif;
    font-size:170px;
    line-height:1;
    color:#fff;
    font-weight:500;
    letter-spacing:10px;

    margin-top:20px;
    margin-bottom:20px;

    text-shadow:
    0 0 2px rgba(255,255,255,.2);
}

/* LOGIN BOX */
.login-box{

    width:370px;

    background:#f5f5f5;

    border-radius:3px;

    padding:
    18px
    24px
    18px;

    border:1px solid rgba(255,255,255,.7);

    box-shadow:
    0 0 10px rgba(255,255,255,.75);
}

/* TITLE */
.title{
    text-align:center;

    color:#0088d2;

    font-size:26px;
    font-weight:400;

    margin-bottom:14px;
}

.title i{
    font-size:20px;
    position:relative;
    top:-1px;
    left:2px;
}

/* INPUT */
.input-group{
    width:100%;
    display:flex;
    margin-bottom:22px;
}

.input-group input{

    width:100%;
    height:39px;

    border:
    1px solid #d5d5d5;

    border-right:none;

    padding:0 10px;

    font-size:16px;

    color:#666;

    outline:none;

    background:#fff;
}

.input-group input::placeholder{
    color:#666;
}

/* ICON BOX */
.icon-box{

    width:48px;
    height:39px;

    background:#eceff1;

    border:
    1px solid #d5d5d5;

    display:flex;
    align-items:center;
    justify-content:center;
}

.icon-box i{
    font-size:18px;
    color:#111;
}

/* BUTTON */
.btn{

    width:100%;
    height:42px;

    border:none;

    background:#0789cf;

    color:#fff;

    font-size:16px;
    font-weight:400;

    cursor:pointer;

    margin-bottom:9px;

    position:relative;

    transition:.2s;
}

.btn:hover{
    background:#067dbc;
}

.btn i{

    position:absolute;

    right:16px;
    top:50%;

    transform:translateY(-50%);

    font-size:17px;
}

/* APK */
.download{
    text-align:center;
    margin-top:8px;
}

.download a{
    text-decoration:none;
    color:#005cff;
    font-size:15px;
}

.download i{
    margin-right:5px;
    font-size:15px;
}

/* FOOTER */
.footer{

    position:absolute;

    bottom:0;
    left:0;

    width:100%;

    background:#0889cf;

    color:#fff;

    text-align:center;

    font-size:24px;
    font-weight:600;

    padding:10px 0 12px;
}

/* MOBILE */
@media(max-width:500px){

    .logo{
        font-size:110px;
    }

    .login-box{
        width:92%;
    }

    .footer{
        font-size:20px;
    }
}

</style>
</head>

<body>

<div class="main">

    <!-- LOGO -->
    <div class="logo">
        ALL
    </div>

    <!-- LOGIN BOX -->
    <div class="login-box">

        <!-- TITLE -->
        <div class="title">
            LOGIN
            <i class="fa-solid fa-hand-point-down"></i>
        </div>

        <!-- USERNAME -->
        <div class="input-group">

            <input type="text" placeholder="Username">

            <div class="icon-box">
                <i class="fa-solid fa-user"></i>
            </div>

        </div>

        <!-- PASSWORD -->
        <div class="input-group">

            <input type="password" placeholder="Password">

            <div class="icon-box">
                <i class="fa-solid fa-key"></i>
            </div>

        </div>

        <!-- LOGIN BUTTON -->
        <button class="btn" onclick="window.location.href='home.html'">

            Login

            <i class="fa-solid fa-right-to-bracket"></i>

        </button>

        <!-- DEMO LOGIN BUTTON -->
        <button class="btn" onclick="window.location.href='home.html'">

            Login with demo ID

            <i class="fa-solid fa-right-to-bracket"></i>

        </button>

        <!-- DOWNLOAD -->
        <div class="download">

            <a href="#">

                <i class="fa-brands fa-android"></i>

                Download APK

            </a>

        </div>

    </div>

</div>

<!-- FOOTER -->
<div class="footer">
    24X7 Support
</div>

</body>
</html>
